<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0c10" />
    <title>TikTok Lead Demo - Feed Submit</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="phone">
      <header class="tiktok-top" id="tiktokTop">
        <div class="ios-bar">
          <span>8:00</span>
          <span>5G ▮▮▮ 100%</span>
        </div>
        <div class="feed-nav">
          <div class="feed-live">LIVE</div>
          <div class="feed-tabs">
            <button class="nav-ghost">Following</button>
            <button class="nav-ghost nav-active">For You</button>
          </div>
          <div class="feed-search">⌕</div>
        </div>
      </header>

      <main id="app"></main>

      <div class="push-layer" id="pushLayer" aria-hidden="true">
        <button class="push-card" id="pushCard" type="button">
          <div class="push-avatar">UMA</div>
          <div class="push-main">
            <div class="push-line1">
              <span class="push-brand">Ultimate Medical Academy</span>
              <span class="push-verified">●</span>
            </div>
            <div class="push-line2">[Auto-follow up] Please confirm your submitted information.</div>
          </div>
          <div class="push-cta">View</div>
        </button>
      </div>

      <nav class="tiktok-tabbar" id="tabbar">
        <button class="tab-item tab-active" type="button"><span>⌂</span><small>Home</small></button>
        <button class="tab-item" type="button"><span>◎</span><small>Friends</small></button>
        <button class="tab-item tab-plus" type="button"><span>＋</span></button>
        <button class="tab-item" type="button"><span>✉</span><small>Inbox</small></button>
        <button class="tab-item" type="button"><span>◉</span><small>Profile</small></button>
      </nav>
    </div>

    <script src="./app-feed-submit.js"></script>
  </body>
</html>
